<script>
(function() {
  function injectTags() {
    var allH3 = document.querySelectorAll('h3');
    if (allH3.length === 0) { setTimeout(injectTags, 300); return; }

    var mapping = {
      'Top 5 Motivos do pedido de reintegração': 'prod',
      'Top 5 Submotivos do pedido de reintegração': 'prod',
      'Distribuição por Estado': 'prod',
      'Comarcas — RJ': 'redesign'
    };

    var newPartial = [
      'Tipo de Desligamento',
      'Taxa de Deferimento',
      'Indicador de Reversão',
      'Justa Causa',
      'Motivo de Reversão',
      'Motivo do pedido de reintegração e taxa'
    ];

    var labels = { 'prod':'● Em produção', 'new':'★ Nova · Sprint atual', 'redesign':'↻ Redesign · Sprint atual' };
    var cls = { 'prod':'stag stag-prod', 'new':'stag stag-new', 'redesign':'stag stag-redesign' };

    allH3.forEach(function(h3) {
      if (h3.querySelector('.stag')) return;
      var text = h3.textContent.trim();
      var status = mapping[text];
      if (!status) {
        for (var i = 0; i < newPartial.length; i++) {
          if (text.indexOf(newPartial[i]) >= 0) { status = 'new'; break; }
        }
      }
      if (status) {
        var tag = document.createElement('span');
        tag.className = cls[status];
        tag.textContent = labels[status];
        h3.appendChild(tag);
      }
    });

    // Tag KPI cards by finding the label divs
    var kpiMap = {
      'Total de Processos': { cls: 'stag stag-prod', txt: '● Em produção' },
      'Mandado de Segurança': { cls: 'stag stag-prod', txt: '● Em produção' },
      'Decisões Deferidas': { cls: 'stag stag-pending', txt: '◐ Em classificação' },
      'Segredo de Justiça': { cls: 'stag stag-pending', txt: '◐ Em classificação' },
      'TAXA DE DECISÃO': { cls: 'stag stag-new', txt: '★ Nova · Sprint atual' },
      'TAXA DE DEFERIMENTO': { cls: 'stag stag-new', txt: '★ Nova · Sprint atual' },
      'TEMPO MÉDIO': { cls: 'stag stag-new', txt: '★ Nova · Sprint atual' },
      'TAXA DE RECURSO TOTAL': { cls: 'stag stag-new', txt: '★ Nova · Sprint atual' }
    };

    document.querySelectorAll('div').forEach(function(div) {
      var txt = div.textContent.trim();
      var info = kpiMap[txt];
      if (info && div.childNodes.length === 1 && div.childNodes[0].nodeType === 3 && !div.querySelector('.stag')) {
        var tag = document.createElement('span');
        tag.className = info.cls;
        tag.textContent = info.txt;
        div.appendChild(tag);
      }
    });

    // Restyle the amber separator banner (between Comarcas and new views)
    // Find it by the specific text content — be very precise
    document.querySelectorAll('div').forEach(function(div) {
      var directText = '';
      div.querySelectorAll('span').forEach(function(s) { directText += s.textContent; });
      if (directText.indexOf('Indicadores abaixo dependem da classificação') >= 0
          && div.style.padding && div.style.borderRadius) {
        div.style.background = '#E3F2FD';
        div.style.border = '1.5px solid #1565C0';
        var spans = div.querySelectorAll('span');
        if (spans.length >= 2) {
          spans[0].textContent = '★';
          spans[1].innerHTML = '<strong style="color:#1565C0">NOVAS VISÕES — Sprint atual</strong><br>Visões abaixo serão entregues nesta sprint. Dados simulados para validação de conceito.';
        }
      }
    });

    // Insert sprint reference banner AFTER the tabs row
    if (document.querySelector('.sprint-banner')) return;
    
    // Find tabs container (the one with Assessment, Insights, etc.)
    var tabsRow = null;
    document.querySelectorAll('div').forEach(function(div) {
      if (!tabsRow && div.style.gap === '4px' && div.style.display === 'flex'
          && div.style.marginBottom === '16px' && div.style.flexWrap === 'wrap'
          && div.children.length > 10) {
        tabsRow = div;
      }
    });
    
    if (tabsRow) {
      var banner = document.createElement('div');
      banner.className = 'sprint-banner';
      banner.innerHTML = '<b>📋 Referência de Sprint — Assessment</b>' +
        '<span class="stag stag-prod">● Em produção</span>' +
        '<span class="stag stag-new">★ Nova · Sprint atual</span>' +
        '<span class="stag stag-redesign">↻ Redesign · Sprint atual</span>' +
        '<span class="stag stag-pending">◐ Em classificação</span>';
      tabsRow.parentNode.insertBefore(banner, tabsRow.nextSibling);
    }
    
    // Add footer summary
    var footerDiv = null;
    document.querySelectorAll('div').forEach(function(div) {
      if (div.textContent.indexOf('© 2026 Deep') >= 0 && div.style.borderTop) {
        footerDiv = div;
      }
    });
    if (footerDiv) {
      var summary = document.createElement('div');
      summary.style.cssText = 'text-align:center;padding:10px 28px;font-size:10px;color:#9AA0A6;font-style:italic;border-top:1px dashed #E8EAED;margin:0 28px;';
      summary.innerHTML = '<strong>Status:</strong> 5 visões em produção · 6 novas nesta sprint · 1 redesign (Comarcas) · 4 KPIs em classificação';
      footerDiv.parentNode.insertBefore(summary, footerDiv);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { setTimeout(injectTags, 600); });
  } else {
    setTimeout(injectTags, 600);
  }
})();
</script>
