  <div style={{ width: "100%", height: h, background: "#F0F0F0", borderRadius: 3, overflow: "hidden" }}>
    <div style={{ width: `${Math.min((value / max) * 100, 100)}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.6s" }} />
  </div>
);

const Spark = ({ data, color = C.red, w = 100, h = 28 }) => {
  const mx = Math.max(...data), mn = Math.min(...data), r = mx - mn || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - 2 - ((v - mn) / r) * (h - 4)}`).join(" ");
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <defs><linearGradient id={`s${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.2" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient></defs>
      <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#s${color.replace("#","")})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

              const cc = conColor(per.consistencia);
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 12px", background: sel === i ? "#FFF5F6" : C.bg, borderRadius: 8, border: `1px solid ${sel === i ? C.red + "33" : "transparent"}` }}>
                  <div style={{ width: 36, textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: cc }}>{per.consistencia}</div>
                    <div style={{ fontSize: 8, color: C.textMuted }}>score</div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 4 }}>{per.nome.split(" ").slice(0, 3).join(" ")}</div>
                    <MiniBar value={per.consistencia} max={100} color={cc} h={5} />
                  </div>
                  <Badge color={cc} bg={cc === C.green ? C.greenLight : cc === C.amber ? C.amberLight : C.redLight}>
                    {per.consistencia >= 85 ? "Previsível" : per.consistencia >= 70 ? "Moderado" : "Volátil"}
                  </Badge>
                </div>
              );
            })}
          </div>
        </div>

        {/* Tempo Médio */}
        <div style={{ background: C.white, borderRadius: 10, border: `1px solid ${C.border}`, padding: 20, boxShadow: C.shadow }}>
          <SectionTitle title="Tempo Médio de Emissão do Laudo" />
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 16, marginTop: -8 }}>Dias entre a nomeação do perito e a entrega do laudo pericial</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[...peritosData].sort((a, b) => a.tempoMedio - b.tempoMedio).map((per, i) => {
              const tc2 = per.tempoMedio <= 30 ? C.green : per.tempoMedio <= 40 ? C.amber : C.red;
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 12px", background: sel === peritosData.indexOf(per) ? "#FFF5F6" : C.bg, borderRadius: 8, border: `1px solid ${sel === peritosData.indexOf(per) ? C.red + "33" : "transparent"}` }}>
                  <div style={{ width: 44, textAlign: "center" }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: tc2 }}>{per.tempoMedio}</div>
                    <div style={{ fontSize: 8, color: C.textMuted }}>dias</div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 4 }}>{per.nome.split(" ").slice(0, 3).join(" ")}</div>
                    <MiniBar value={per.tempoMedio} max={60} color={tc2} h={5} />
                  </div>
                  <Badge color={tc2} bg={tc2 === C.green ? C.greenLight : tc2 === C.amber ? C.amberLight : C.redLight}>
                    {per.tempoMedio <= 30 ? "Rápido" : per.tempoMedio <= 40 ? "Regular" : "Lento"}
                  </Badge>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};
