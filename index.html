        <div style={{background:C.white,borderRadius:10,border:"1px solid "+C.border,padding:16}}><SectionTitle title="Perito × Advogado Reclamante" />{dp.advogados.map((a,i)=>{const d=a.favCom-a.favSem;return(<div key={i} style={{marginBottom:12,padding:10,background:C.bg,borderRadius:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:C.text}}>{a.nome}</span><span style={{fontSize:10,color:C.textMuted}}>{a.proc} proc.</span></div><div style={{display:"flex",gap:16,alignItems:"center",marginTop:4}}><div><div style={{fontSize:10,color:C.textMuted}}>Com advogado</div><div style={{fontSize:16,fontWeight:800,color:d>0?C.red:C.green}}>{a.favCom}%</div></div><div><div style={{fontSize:10,color:C.textMuted}}>Sem advogado</div><div style={{fontSize:16,fontWeight:800,color:C.textSec}}>{a.favSem}%</div></div><Badge color={d>0?C.red:C.green} bg={d>0?C.redLight:C.greenLight}>{d>0?"+":""}{d}pp</Badge></div></div>);})}</div>
      </div>

      {/* Vara + CID */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
        <div style={{background:C.white,borderRadius:10,border:"1px solid "+C.border,padding:16}}><SectionTitle title="Perito × Vara / Juiz" />{dp.varas.map((v,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"8px 10px",background:C.bg,borderRadius:6}}><div style={{width:36,textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:v.fav>=50?C.red:C.green}}>{v.fav}%</div></div><div style={{flex:1}}><div style={{fontSize:11,fontWeight:600,color:C.text}}>{v.vara}</div><div style={{fontSize:10,color:C.textMuted}}>{v.juiz} · {v.proc} proc.</div><MiniBar value={v.fav} max={100} color={v.fav>=50?C.red:C.green} h={4} /></div></div>))}</div>

        <div style={{background:C.white,borderRadius:10,border:"1px solid "+C.border,padding:16}}><SectionTitle title="Taxa Favorável por CID" />{dp.cids.map(c=>(<div key={c.cid} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:C.textSec}}>{c.cid}</span><span style={{fontSize:11,fontWeight:700,color:c.fav>=50?C.red:C.green}}>{c.fav}%</span></div><div style={{display:"flex",height:8,borderRadius:4,overflow:"hidden",background:"#F0F0F0"}}><div style={{width:c.fav+"%",background:C.purple}} /><div style={{width:(100-c.fav)+"%",background:C.red}} /></div></div>))}<div style={{borderTop:"1px solid "+C.border,paddingTop:12,marginTop:6}}><div style={{fontSize:11,fontWeight:700,color:C.textSec,marginBottom:8}}>Por Submotivo</div>{dp.submotivos.map(s=>(<div key={s.sub} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:10,color:C.textSec}}>{s.sub}</span><span style={{fontSize:10,color:C.purple}}>{s.fav}% | <span style={{color:C.red}}>{s.desfav}%</span></span></div><div style={{display:"flex",height:6,borderRadius:3,overflow:"hidden",background:"#F0F0F0"}}><div style={{width:s.fav+"%",background:C.purple}} /><div style={{width:s.desfav+"%",background:C.red}} /></div></div>))}</div></div>
      </div>

      {/* Histórico */}
      <div style={{background:C.white,borderRadius:10,border:"1px solid "+C.border,overflow:"hidden"}}>
        <div style={{padding:"14px 16px 0"}}><SectionTitle title="Histórico de Processos" /></div>
        <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{borderBottom:"2px solid "+C.border}}>{["CNJ","Data","CID","Submotivo","Resultado","Comarca","Valor"].map(h=>(<th key={h} style={{padding:"8px 12px",fontSize:10,fontWeight:700,color:C.textSec,textAlign:"left",textTransform:"uppercase"}}>{h}</th>))}</tr></thead><tbody>{hist.map((h,i)=>(<tr key={i} style={{borderBottom:"1px solid "+C.border}}><td style={{padding:"8px 12px",fontSize:11,fontWeight:600,color:C.blue,fontFamily:"monospace"}}>{h.cnj}</td><td style={{padding:"8px 12px",fontSize:11,color:C.textSec}}>{h.data}</td><td style={{padding:"8px 12px",fontSize:10,color:C.textSec}}>{h.cid}</td><td style={{padding:"8px 12px",fontSize:10,color:C.textSec}}>{h.sub}</td><td style={{padding:"8px 12px"}}><Badge color={h.res==="Favorável"?C.green:C.red} bg={h.res==="Favorável"?C.greenLight:C.redLight}>{h.res}</Badge></td><td style={{padding:"8px 12px",fontSize:11,color:C.textSec}}>{h.com}</td><td style={{padding:"8px 12px",fontSize:11,color:C.textSec}}>{h.val}</td></tr>))}</tbody></table>
      </div>
    </div>
  </div>);
};

  const [expandedTrt, setExpandedTrt] = useState(null);

  return (<div>
    {modal!==null && <DetailModal idx={modal} onClose={()=>setModal(null)} />}

    <FilterBar filters={[{label:"Comarca",options:["Todas as Comarcas","São Paulo","Campinas","Santos","Ribeirão Preto","Rio de Janeiro"]},{label:"Especialidade",options:["Todas","Ortopedia","Psiquiatria","Clínica Geral","Neurologia"]},{label:"Tendência",options:["Todas","Alta","Estável","Baixa"]},{label:"CID",options:["Todos os CIDs","F32 — Episódio Depressivo","F41 — Transtornos Ansiosos","F43 — Estresse Pós-Traumático","M54 — Dorsalgia","M75 — Lesões do Ombro","G56 — Sínd. Túnel do Carpo"]}]} />

    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>

      <CardStat label="Volume de Processos" value="705" sub="Com perícia" icon="📋" iconBg={C.redLight} iconColor={C.red} />
      <CardStat label="Tx. Favorável Média" value="45%" sub="dos laudos" icon="✅" iconBg={C.greenLight} iconColor={C.green} />
      <CardStat label="Comarcas Cobertas" value="12" sub="SP, RJ" icon="📍" iconBg={C.amberLight} iconColor={C.amber} />
    </div>

      <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr style={{borderBottom:"2px solid "+C.border}}>{["Perito","Comarca","Processos","Favorável","Desfavorável","Consist.","Tempo","Estratégia","Tendência","Ações"].map(h=>(<th key={h} style={{padding:"10px 12px",fontSize:10,fontWeight:700,color:C.textSec,textAlign:"left",textTransform:"uppercase"}}>{h}</th>))}</tr></thead>
